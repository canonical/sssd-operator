name: CI

on:
  workflow_call:
  pull_request:

jobs:
  ci:
    uses: canonical/hpc-team/.github/workflows/charmed-hpc-ci.yaml@main
    with:
      setup-commands: sudo snap install astral-uv --classic
      run-test: false

  unit-test:
    name: Unit tests
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - uses: canonical/hpc-team/.github/actions/setup-just@main
      - name: Install uv
        run: sudo snap install astral-uv --classic
      - run: just unit

  integration-test:
    name: Integration tests (LXD)
    runs-on: ubuntu-26.04
    needs:
      - ci
      - unit-test
    steps:
      - uses: actions/checkout@v7
      - uses: canonical/hpc-team/.github/actions/setup-just@main
      - name: Install uv
        run: sudo snap install astral-uv --classic
      - name: Install charmcraft
        run: sudo snap install charmcraft --classic
      - name: Install `gherkinator`
        run: |
          sudo apt-add-repository ppa:nuccitheboss/gherkinator --yes
          sudo apt install gherkinator
      - name: Setup operator environment
        uses: charmed-kubernetes/actions-operator@main
        with:
          provider: lxd
          lxd-channel: 5.21/stable
          juju-channel: 3.6/edge
      - run: just integration
